name: Points Snapshot Cron

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight
  workflow_dispatch:       # allows manual run

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        run: |
          curl -X POST \
          -H "x-cron-secret: purrlend_points_secret_2026" \
          https://purrlend-points-api-production.up.railway.app/api/points/snapshot
